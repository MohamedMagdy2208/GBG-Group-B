services:
  db:
    image: postgres:15
    container_name: chinook-postgres
    environment:
      POSTGRES_USER: chinook
      POSTGRES_PASSWORD: chinook
      POSTGRES_DB: chinook
    ports:
      - "5432:5432"
    volumes:
      - chinook_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chinook -d chinook"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  chinook_postgres_data:
